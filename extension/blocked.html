<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fokus — not now</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <main class="card">
    <div class="badge">FOKUS</div>
    <div class="label">you said you would:</div>
    <h1 id="task">&mdash;</h1>
    <div class="timer" id="timer">--:--</div>
    <div class="blocked-url">blocked: <span id="blocked-url"></span></div>
    <section class="allowed">
      <div class="label">allowed during this sprint</div>
      <div id="allowed"></div>
    </section>
  </main>
  <script src="blocked.js"></script>
</body>
</html>
